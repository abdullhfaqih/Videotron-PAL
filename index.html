<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banner Digital Luxury - Pengukuhan Alumni</title>
  <style>
    /* Menggunakan font elegan */
    @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@400;500;600&display=swap");

    :root {
      --ratio-w: 16;
      --ratio-h: 9;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body,
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Cinzel", serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      /* Spotlight lebih redup agar teks lebih menyala */
      background: radial-gradient(circle at center,
          #6b0c1e 0%,
          #4a0512 55%
          /* #1c0106 100% */
        );

      /* aspect-ratio: 16 / 9; */
    }

    /* --- KANVAS BANNER (BARU) --- */
    .banner-canvas {
      position: relative;
      container-type: inline-size;
      /* Kunci agar bisa pakai ukuran cqw */
      aspect-ratio: var(--ratio-w) / var(--ratio-h);
      width: 100%;
      max-height: 100vh;
      max-width: calc(100vh * (var(--ratio-w) / var(--ratio-h)));

      /* Settingan dari body kodemu dipindah ke sini */
      /* background-color: #620a1a; */
      /* STRICT PALETTE: Maroon */
      /* font-family: "Cinzel", serif;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center; */
      /* Spotlight Maroon & Black transparent */
      /* background: radial-gradient(circle at center,
          #620a1a 0%,
          rgba(0, 0, 0, 0.6) 100%);
      overflow: hidden; */
    }

    .banner-container {
      /* position: relative; */
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      aspect-ratio: 21 / 9;
      /* background-color: #ffffff; */
    }

    /* --- PARTIKEL BACKGROUND --- */
    #particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* --- ORNAMEN GARIS LENGKUNG EMAS --- */
    .gold-waves {
      position: absolute;
      width: 35vw;
      height: auto;
      z-index: 2;
      opacity: 0.25;
      /* Dibuat lebih tipis agar tidak mengganggu bacaan */
      pointer-events: none;
    }

    .wave-top-left {
      top: -5%;
      left: -5%;
      transform: rotate(15deg);
    }

    .wave-bottom-right {
      bottom: -5%;
      right: -5%;
      transform: rotate(195deg);
    }

    /* --- CONTAINER LOGO --- */
    .logo-section-atas {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 25px 0;
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 0.5s;

    }

    .logo-section-bawah {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      padding: 25px 0;
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 3.5s;

    }

    .logo-box-atas {
      padding: 5px 5px;
      height: 60px;
      width: 180px;
      border-radius: 15px;
      background-color: rgba(255, 253, 211, 0.376);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.215);
      display: flex;
      justify-content: center;
      align-items: center;

    }

    .logo-box-bawah {
      padding: 5px 5px;

      height: 35px;
      width: 150px;
      border-radius: 10px;
      background-color: rgba(255, 253, 211, 0.376);
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.215);
      display: flex;
      justify-content: center;
      align-items: center;
      align-items: center;

    }

    .logo-box-atas img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    .logo-bem {
      margin-right: 5px;
    }

    /* --- KONTEN UTAMA --- */
    .main-content {
      z-index: 10;
      text-align: center;
      width: 90%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .gold-text-small {
      font-size: 2.8vw;
      font-weight: 700;
      letter-spacing: 0.3em;
      color: #C49e57;
      margin-bottom: 2vh;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 1s;
    }

    .gold-text-large {
      font-size: 4vw;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1.25;
      background: linear-gradient(to right,
          #c5a059,
          #fdf4d6,
          #d4af37,
          #fdf4d6,
          #c5a059);
      background-size: 200% auto;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      margin-bottom: 1.5vh;
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 1.5s, shimmer 7s linear infinite;
    }

    .cream-text {
      font-size: 2.5vw;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: #fdf4d6;
      margin-bottom: 3vh;
      text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.8);
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 2s;
    }

    .tagline {
      font-family: "Montserrat", sans-serif;
      font-size: 1.5vw;
      font-weight: 400;
      /* Ditebalkan sedikit agar mudah dibaca */
      color: #f3e6d4;
      line-height: 1.8;
      letter-spacing: 0.15em;
      margin-bottom: 5vh;
      text-shadow: 1px 2px 5px rgba(0, 0, 0, 0.8);
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 2.5s;

    }

    .tagline strong {
      font-weight: 600;
      color: #d4af37;
    }

    /* --- INFO PILLS (LOKASI, TANGGAL, JAM) --- */
    .info-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      opacity: 0;
      animation: loopInOut 15s cubic-bezier(0.25, 1, 0.5, 1) infinite 3s;
    }

    .info-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 25px;
      border-radius: 50px;
      border: 1px solid #c39d56;
      /* Border emas lebih solid */
      background-color: rgba(30,
          2,
          8,
          0.5);
      color: #f3e6d4;
      /* Background lebih pekat agar tulisan kontras */
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
      font-family: "Montserrat", sans-serif;
      font-size: 0.95vw;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .info-icon {
      font-size: 1.1vw;
      color: #d4af37;
    }

    /* --- ANIMASI --- */
    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInSlow {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    @keyframes loopInOut {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }

      /* Awal: Sembunyi di bawah */
      10% {
        opacity: 1;
        transform: translateY(0);
      }

      /* Muncul & diam */
      75% {
        opacity: 1;
        transform: translateY(0);
      }

      /* Tetap diam biar bisa dibaca */
      85% {
        opacity: 0;
        transform: translateY(-20px);
      }

      /* Hilang melayang ke atas */
      100% {
        opacity: 0;
        transform: translateY(20px);
      }

      /* Kembali ke bawah siap mengulang */
    }

    /* Dekorasi sudut emas yang lebih tajam */
    .corner {
      position: absolute;
      width: 150px;
      height: 300px;
      border: 2.6px solid transparent;
      z-index: 5;
    }


    .top-right {
      top: 30px;
      right: 30px;
      border-top-color: #d4af37;
      border-right-color: #d4af37;
      /* box-shadow: inset -10px 10px 20px -10px rgba(212, 175, 55, 0.3); */
    }

    .bottom-left {
      bottom: 30px;
      left: 30px;
      border-bottom-color: #d4af37;
      border-left-color: #d4af37;
      /* box-shadow: inset 10px -10px 20px -10px rgba(212, 175, 55, 0.3); */
    }
  </style>
</head>

<body>
  <div class="banner-container">
    <!-- <div class="corner top-left"></div> -->
    <div class="corner top-right"></div>
    <div class="corner bottom-left"></div>
    <!-- <div class="corner bottom-right"></div> -->

    <svg class="gold-waves wave-top-left" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,100 C150,200 200,0 400,100 C500,150 450,300 500,400" stroke="url(#goldGrad)" stroke-width="2"
        fill="transparent" />
      <path d="M-50,150 C100,250 150,50 350,150 C450,200 400,350 450,450" stroke="url(#goldGrad)" stroke-width="4"
        stroke-opacity="0.5" fill="transparent" />
      <path d="M-100,200 C50,300 100,100 300,200 C400,250 350,400 400,500" stroke="url(#goldGrad)" stroke-width="1"
        stroke-opacity="0.8" fill="transparent" />
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#D4AF37" />
          <stop offset="50%" stop-color="#F3E6D4" />
          <stop offset="100%" stop-color="#B8860B" />
        </linearGradient>
      </defs>
    </svg>

    <svg class="gold-waves wave-bottom-right" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,100 C150,200 200,0 400,100 C500,150 450,300 500,400" stroke="url(#goldGrad)" stroke-width="2"
        fill="transparent" />
      <path d="M-50,150 C100,250 150,50 350,150 C450,200 400,350 450,450" stroke="url(#goldGrad)" stroke-width="4"
        stroke-opacity="0.5" fill="transparent" />
      <path d="M-100,200 C50,300 100,100 300,200 C400,250 350,400 400,500" stroke="url(#goldGrad)" stroke-width="1"
        stroke-opacity="0.8" fill="transparent" />
    </svg>

    <canvas id="particle-canvas"></canvas>

    <div class="logo-section-atas">
      <div class="logo-box-atas">
        <img src="./img/logoPolinema.png" alt="Logo" class="logo-polinema" />
        <img src="./img/logoBEM.png" alt="Logo" class="logo-bem" />
        <img src="./img/gelora-kartha.png" alt="Logo" class="logo-gelora" />
      </div>
    </div>

    <div class="main-content">
      <div class="gold-text-small">PENGUKUHAN ALUMNI</div>
      <div class="gold-text-large">BADAN EKSEKUTIF MAHASISWA</div>
      <div class="cream-text">POLITEKNIK NEGERI MALANG</div>

      <div class="tagline">
        <strong>MENGUKUHKAN JEJAK, MENYULAM ASA:</strong><br />
        LANGKAH AWAL MENJAGA NYALA PENGABDIAN LINTAS GENERASI.
      </div>

      <div class="info-bar">
        <div class="info-pill">
          <span class="info-icon">📍</span>
          <span>Auditorium Teknik Sipil Lantai 8</span>
        </div>
        <div class="info-pill">
          <span class="info-icon">📅</span>
          <span>13 Juni 2026</span>
        </div>
        <div class="info-pill">
          <span class="info-icon">⏰</span>
          <span>07:00 - 17:00 WIB</span>
        </div>
      </div>
    </div>

    <div class="logo-section-bawah">
      <div class="logo-box-bawah">
        LOGO BAWAH
      </div>
    </div>
  </div>
  <script>
    const canvas = document.getElementById("particle-canvas");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener("resize", resize);
    resize();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5; // Partikel sedikit diperkecil
        this.speedY = Math.random() * 0.4 + 0.1;
        this.opacity = Math.random() * 0.4 + 0.1;
      }
      update() {
        this.y -= this.speedY;
        if (this.y < -10) {
          this.y = canvas.height + 10;
          this.x = Math.random() * canvas.width;
        }
      }
      draw() {
        ctx.fillStyle = `rgba(243, 230, 212, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      for (let i = 0; i < 70; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p) => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    init();
    animate();
  </script>
</body>

</html>
